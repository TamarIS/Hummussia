<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 240" width="640" height="240">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&amp;display=swap');
      .die { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 300; font-size: 22px; letter-spacing: 0.38em; fill: #1A1814; }
      .name { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 400; font-size: 62px; letter-spacing: 0.08em; fill: #1A1814; }
      .tagline { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 300; font-size: 12px; letter-spacing: 0.42em; fill: #8C5E3A; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="640" height="240" fill="#F4EDD4"/>

  <!-- Flanking rules around DIE -->
  <line x1="148" y1="88" x2="238" y2="88" stroke="#8C5E3A" stroke-width="0.75"/>
  <line x1="402" y1="88" x2="492" y2="88" stroke="#8C5E3A" stroke-width="0.75"/>

  <!-- DIE -->
  <text x="320" y="96" text-anchor="middle" class="die">D I E</text>

  <!-- HUMMUSSIA -->
  <text x="320" y="162" text-anchor="middle" class="name">HUMMUSSIA</text>

  <!-- Bottom rule -->
  <line x1="200" y1="178" x2="440" y2="178" stroke="#1A1814" stroke-width="0.5" opacity="0.3"/>

  <!-- Tagline -->
  <text x="320" y="200" text-anchor="middle" class="tagline">HUMMUS CULTURE</text>
</svg>
